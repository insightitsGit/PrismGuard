# Default triage thresholds and fusion weights (Part I of handoff).
# Per-category overrides under `categories:`; tuned values land here from T9c calibration.

gray_zone_policy: escalate  # escalate | fail_open | fail_closed — requires Guard Model artifact

embedding:
  corpus_path_enabled: false  # skip MiniLM + ANN + fusion; ONNX + rules/structural only
  chunk_overlap_ratio: 0.25
  suspicious_ngram_floor: 0.15
  prefer_transformer: true
  model_name: sentence-transformers/all-MiniLM-L6-v2

guard_model:
  enabled: true
  classifier_mode: first  # first | parallel | gray_only | hybrid — hybrid skips ONNX on tier1/structural blocks
  artifact_id: prism-pi-v1
  artifact_path: ""  # optional override; or set PRISMGUARD_GUARD_MODEL_PATH
  uncertain_low: 0.35
  uncertain_high: 0.65
  veto_enabled: true
  veto_threshold: 0.65
  disagreement_escalation: true  # structural allow + classifier disagree → Judge, not veto
  classifier_first_block_threshold: 0.85

tenant_context:
  enabled: false  # opt-in; set true when tenant_lexicon.yaml is provided
  lexicon_path: ""  # or PRISMGUARD_TENANT_LEXICON_PATH
  severity_boost_restricted: 0.15
  severity_boost_internal: 0.08
  force_classifier_on_override: true

normalization:
  max_obfuscation_depth: 3

fusion:
  w_sim: 0.35
  w_graph: 0.10   # prismRAG word-graph BFS (Bug3 T9)
  w_rule: 0.20
  w_sev: 0.15
  w_comm: 0.08   # Louvain community routing (Bug3 T9)
  w_clf: 0.30    # parallel Guard Model injection probability (Option A)
  w_benign: 0.30
  w_session: 0.15
  weak_signal_floor: 0.25
  min_weak_signals_for_gray: 2

benign_fast_path:
  benign_allow_floor: 0.72
  benign_margin_delta: 0.08

triage:
  block_threshold: 0.78
  allow_threshold: 0.42
  corpus_match_override_threshold: 0.92

structural:
  structural_block_threshold: 0.85
  structural_allow_threshold: 0.20

routing:
  community_confidence_floor: 0.55

cache:
  semantic_cache_threshold: 0.97
  ttl_seconds: 3600

judge:
  rate_cap_per_minute: 60
  tighten_block_threshold_delta: 0.05
  tighten_weak_signal_floor_delta: 0.10
  accept_guard_at_lower_confidence_when_capped: true
  confidence_floor: 0.70

categories: {}
