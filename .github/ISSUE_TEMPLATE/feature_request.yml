name: Feature request
description: Suggest an improvement to PrismGuard
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain does this solve for users?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should PrismGuard behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope notes
      options:
        - label: I understand healthcare/finance readiness is not claimed yet
        - label: This does not require leaking secrets or weakening license gates
