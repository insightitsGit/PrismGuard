name: Bug report
description: Report a defect in PrismGuard
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For **security** issues, email info@insightits.com instead — see [SECURITY.md](../SECURITY.md).
  - type: input
    id: version
    attributes:
      label: PrismGuard version
      description: Output of `python -c "import prismguard; print(prismguard.__version__)"` or the PyPI pin you installed.
      placeholder: "0.1.6"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.x"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: extras
    attributes:
      label: Install command / extras
      description: Exact pip install line (e.g. `pip install "prismguard[guard-model]==0.1.6"`).
      placeholder: pip install "prismguard[guard-model]==0.1.6"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code.
      render: bash
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
    validations:
      required: false
