name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[guard-model,serve,enterprise,dev]"
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
      - name: Verify wheel build (no ONNX in package)
        run: |
          pip install build
          python -m build
          python -c "
          import glob, zipfile
          w = glob.glob('dist/*.whl')[0]
          z = zipfile.ZipFile(w)
          onnx = [n for n in z.namelist() if n.endswith('model.onnx')]
          assert not onnx, f'model.onnx must not ship in wheel: {onnx}'
          import pathlib
          assert pathlib.Path(w).stat().st_size < 100 * 1024 * 1024
          print('wheel OK:', w)
          "

  # Regression gate for Buglib1: base wheel with zero extras must not crash on entry points.
  base-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel with zero extras in clean venv
        run: |
          python -m venv .venv-base
          .venv-base/bin/pip install --upgrade pip
          .venv-base/bin/pip install dist/prismguard-*.whl
      - name: Base entry points must not crash
        run: |
          set -euo pipefail
          .venv-base/bin/prismguard --help

          # doctor may exit 1 when guard-model extras / seed are absent — that is OK.
          # Regression gate: must print a JSON report, not ModuleNotFoundError: numpy.
          set +e
          doctor_out=$(.venv-base/bin/prismguard doctor 2>&1)
          doctor_code=$?
          set -e
          echo "$doctor_out"
          echo "$doctor_out" | grep -q '"name": "guard_model"'
          echo "$doctor_out" | grep -qi 'prismguard\[guard-model\]'
          if echo "$doctor_out" | grep -qi "No module named 'numpy'"; then
            echo "FAIL: base install still requires numpy at import time"
            exit 1
          fi
          test "$doctor_code" -eq 0 -o "$doctor_code" -eq 1

          .venv-base/bin/prismguard-seed --help
          .venv-base/bin/prismguard-model --help
          .venv-base/bin/prismguard-profile --help

          # serve hard-requires [serve]; must fail with a clear message, not ModuleNotFoundError: numpy
          set +e
          out=$(.venv-base/bin/prismguard-serve 2>&1)
          code=$?
          set -e
          echo "$out"
          test "$code" -ne 0
          echo "$out" | grep -qi "prismguard\[serve\]"
          if echo "$out" | grep -qi "No module named 'numpy'"; then
            echo "FAIL: prismguard-serve crashed on numpy instead of asking for [serve]"
            exit 1
          fi
