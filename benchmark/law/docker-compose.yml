services:
  cpl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: cpl
        EXTRAS: prism,seed,benchmark-law,guard-model
    ports:
      - "8010:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"

  cgl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: cgl
        EXTRAS: prism,seed,benchmark-law,llm-guard
    ports:
      - "8011:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"

  lfl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: lfl
        EXTRAS: prism,seed,benchmark-law,llamafirewall
    ports:
      - "8012:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}

  lpl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: lpl
        EXTRAS: prism,seed,benchmark-law,guard-model
    ports:
      - "8013:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"

  atk:
    build:
      context: ../..
      dockerfile: benchmark/law/atk/Dockerfile
    depends_on:
      - cpl
      - cgl
      - lfl
      - lpl
    environment:
      TARGET_CPL: http://cpl:8080
      TARGET_CGL: http://cgl:8080
      TARGET_LFL: http://lfl:8080
      TARGET_LPL: http://lpl:8080
    volumes:
      - ./results/latest:/results
    command:
      [
        "python",
        "-m",
        "benchmark.law.atk.attack_runner",
        "--output-dir",
        "/results",
        "--bundled-profile",
        "full",
        "--bundled-limit",
        "100",
      ]
