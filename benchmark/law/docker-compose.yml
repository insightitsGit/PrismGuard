services:
  cpl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: cpl
        EXTRAS: prism,seed,benchmark-law,guard-model
        MAX_TRAIN_EXAMPLES: ${MAX_TRAIN_EXAMPLES:-0}
    ports:
      - "8010:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      PRISMGUARD_ORT_INTRA_THREADS: ${PRISMGUARD_ORT_INTRA_THREADS:-2}
      PRISMGUARD_EMBED_CACHE_SIZE: ${PRISMGUARD_EMBED_CACHE_SIZE:-512}

  cgl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: cgl
        EXTRAS: prism,seed,benchmark-law,llm-guard
    ports:
      - "8011:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"

  lgl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: lgl
        EXTRAS: prism,seed,benchmark-law,llm-guard
    ports:
      - "8012:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"

  lpl:
    build:
      context: ../..
      dockerfile: benchmark/law/Dockerfile.stack
      args:
        STACK: lpl
        EXTRAS: prism,seed,benchmark-law,guard-model
        MAX_TRAIN_EXAMPLES: ${MAX_TRAIN_EXAMPLES:-0}
    ports:
      - "8013:8080"
    environment:
      PORT: "8080"
      TOKENIZERS_PARALLELISM: "false"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      PRISMGUARD_ORT_INTRA_THREADS: ${PRISMGUARD_ORT_INTRA_THREADS:-2}
      PRISMGUARD_EMBED_CACHE_SIZE: ${PRISMGUARD_EMBED_CACHE_SIZE:-512}

  atk:
    build:
      context: ../..
      dockerfile: benchmark/law/atk/Dockerfile
    depends_on:
      - cpl
      - cgl
      - lgl
      - lpl
    environment:
      TARGET_CPL: http://cpl:8080
      TARGET_CGL: http://cgl:8080
      TARGET_LGL: http://lgl:8080
      TARGET_LPL: http://lpl:8080
    volumes:
      - ./results/latest:/results
    command:
      [
        "python",
        "-m",
        "benchmark.law.atk.attack_runner",
        "--output-dir",
        "/results",
        "--bundled-profile",
        "full",
        "--bundled-limit",
        "100",
      ]
