# Storage backend selection. Vector ANN is swappable; pgvector is the default production backend.
# See handoffs/handoffPrismGuardImplementation.md Part J.

backend: memory   # memory | pgvector | chroma | pinecone | weaviate

pgvector:
  dsn: ""          # postgresql://user:pass@host:5432/db
  schema_prefix: prismguard

chroma:
  collection_name: prismguard_seeds
  persist_directory: ""   # optional local path

pinecone:
  index_name: ""
  namespace: prismguard

weaviate:
  class_name: PrismGuardSeed
  url: ""
