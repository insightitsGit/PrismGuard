<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="PrismGuard  prompt injection firewall for production LLM applications">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2563eb" flood-opacity="0.35"/>
    </filter>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="420" rx="18" fill="url(#heroBg)"/>
  <rect x="1" y="1" width="958" height="418" rx="17" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Brand -->
  <text x="480" y="58" text-anchor="middle" fill="url(#brand)" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">PrismGuard</text>
  <text x="480" y="88" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="600">Prompt Injection Firewall</text>
  <text x="480" y="112" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="500">for Production LLM Applications</text>

  <!-- Flow -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <!-- User -->
    <rect x="420" y="140" width="120" height="40" rx="10" fill="#334155" stroke="#64748b" filter="url(#cardShadow)"/>
    <text x="480" y="165" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="600">User</text>

    <line x1="480" y1="180" x2="480" y2="200" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- PrismGuard -->
    <rect x="355" y="200" width="250" height="52" rx="12" fill="url(#shield)" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
    <text x="480" y="232" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">PrismGuard</text>

    <!-- Branches -->
    <line x1="480" y1="252" x2="480" y2="268" stroke="#64748b" stroke-width="2"/>
    <line x1="320" y1="268" x2="640" y2="268" stroke="#64748b" stroke-width="2"/>
    <line x1="320" y1="268" x2="320" y2="282" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="480" y1="268" x2="480" y2="282" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="640" y1="268" x2="640" y2="282" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="260" y="282" width="120" height="36" rx="8" fill="#0f766e" stroke="#2dd4bf"/>
    <text x="320" y="305" text-anchor="middle" fill="#ecfeff" font-size="13" font-weight="600">Rules</text>

    <rect x="420" y="282" width="120" height="36" rx="8" fill="#6d28d9" stroke="#a78bfa"/>
    <text x="480" y="305" text-anchor="middle" fill="#f5f3ff" font-size="13" font-weight="600">ONNX</text>

    <rect x="580" y="282" width="120" height="36" rx="8" fill="#b45309" stroke="#fbbf24"/>
    <text x="640" y="305" text-anchor="middle" fill="#fffbeb" font-size="13" font-weight="600">Judge</text>

    <line x1="480" y1="318" x2="480" y2="338" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- LLM -->
    <rect x="395" y="338" width="170" height="44" rx="10" fill="#166534" stroke="#4ade80" filter="url(#cardShadow)"/>
    <text x="480" y="366" text-anchor="middle" fill="#ecfdf5" font-size="16" font-weight="700">Your LLM</text>
  </g>

  <!-- Tagline -->
  <text x="480" y="404" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="12">Self-hosted · Explainable · Audit-ready</text>
</svg>
